# Default values for mychart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/sonamsamdupkhangsar/role-rest-service
  tag: latest
  pullPolicy: Always


imagePullSecrets:
  - name: github-regcred
nameOverride: ""
fullnameOverride: "role-rest-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

rbac:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - services
        - endpoints
      verbs:
        - get
        - list
        - watch

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
#  type: NodePort
  port: 80
  targetPort: 8080

istio:
  enabled: false

ingress:
  enabled: false

resources:
  requests:
    cpu: 150m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 768Mi

#nodeSelector:
#  node.kubernetes.io/instance-type: s-1vcpu-2gb

tolerations: []

affinity: {}

postgres:
  port: "5432"
  service: role-db-rw
  secretfile: role-db-app
  dbname: role


envs:
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=25"
  - name: DB_SSLMODE
    value: disable
  - name: SPRING_PROFILES_ACTIVE
    value: kubernetes,non-eureka
  - name: ISSUER_URI
    value: https://platform.openissuer.com/issuer
  - name: JWT_SET_URI
    value: https://platform.openissuer.com/issuer/oauth2/jwks
  - name: OAUTH_AUDIENCES
    value: oauth-client,nextjs-client
  - name: NEW_RELIC_ENABLED
    value: false

health:
  liveness:
    path: /roles/api/health/liveness
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 5
    failureThreshold: 5
  readiness:
    path: /roles/api/health/readiness
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 5
    failureThreshold: 5
