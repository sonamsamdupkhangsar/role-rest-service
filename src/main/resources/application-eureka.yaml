# Local Eureka profile: loads local database, server port, Eureka registry, and service-id endpoints.
server:
  port: 8082

POSTGRES_USERNAME: test
POSTGRES_PASSWORD: test
POSTGRES_DBNAME: role
POSTGRES_SERVICE: localhost:5432
DB_SSLMODE: disable

EUREKA_HOST: localhost:8761
EUREKA_USER: test
EUREKA_PASSWORD: test

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://${EUREKA_USER}:${EUREKA_PASSWORD}@${EUREKA_HOST}/eureka


ISSUER_ADDRESS: http://platform.openissuer.test:9001

ISSUER_URI: ${ISSUER_ADDRESS}
OAUTH_AUDIENCES: oauth-client
JWT_SET_URI: ${ISSUER_ADDRESS}/oauth2/jwks
